<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>Monitor Vitálních Funkcí (Web Serial)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            color: #e6edf3;
        }


        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .col-setup {
            flex: 2;
            background: #161b22;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #21262d;
        }

        .col-status {
            flex: 1;
            background: #161b22;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #21262d;
        }

        /* Karty s hodnotami */
        .cards-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .val {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: monospace;
        }

        .red {
            color: #ff7b72;
        }

        .blu {
            color: #79c0ff;
        }

        .grn {
            color: #56d364;
        }

        /* Tlačítko a design inputů */
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        button:hover {
            background: #2ea043;
        }

        button:disabled {
            background: #21262d;
            color: #8b949e;
            cursor: not-allowed;
        }

        .status-text {
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            text-align: center;
        }

        .status-ready {
            background: rgba(56, 139, 253, 0.15);
            color: #58a6ff;
            border: 1px solid rgba(56, 139, 253, 0.4);
        }

        .status-run {
            background: rgba(46, 160, 67, 0.15);
            color: #56d364;
            border: 1px solid rgba(46, 160, 67, 0.4);
        }

        /* Box pro graf */
        .chart-container {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 20px;
            height: 350px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>◈ MONITOR VITÁLNÍCH FUNKCÍ (WEB SERIAL EXPERT)</h1>
    </div>

    <div class="row">
        <div class="col-setup">
            <label style="display:block; margin-bottom: 10px; color: #8b949e;">Měřicí přístroj:</label>
            <button id="connectBtn">▶ START MĚŘENÍ (PŘIPOJIT BLUETOOTH)</button>
        </div>
        <div class="col-status">
            <label style="display:block; margin-bottom: 5px; color: #8b949e;">Stav systému</label>
            <div id="statusBox" class="status-text status-ready">⏹ Připraveno</div>
        </div>
    </div>

    <div class="cards-row">
        <div class="card">
            <div id="tepVal" class="val red">--</div>
            <div style="color: #8b949e; font-size: 0.9rem; margin-top: 5px;">TEP (BPM)</div>
        </div>
        <div class="card">
            <div id="kyslikVal" class="val blu">-- %</div>
            <div style="color: #8b949e; font-size: 0.9rem; margin-top: 5px;">KYSLÍK (SpO2)</div>
        </div>
        <div class="card">
            <div id="casVal" class="val grn">--:--:--</div>
            <div style="color: #8b949e; font-size: 0.9rem; margin-top: 5px;">ČAS ZÁZNAMU</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="vitalChart"></canvas>
    </div>

    <script>
        let port;
        let reader;
        let inputBuffer = "";

        // Inicializace Chart.js grafu v temném designu
        const ctx = document.getElementById('vitalChart').getContext('2d');
        const vitalChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Časové osy
                datasets: [
                    { label: 'Tep (BPM)', data: [], borderColor: '#ff7b72', backgroundColor: '#ff7b72', tension: 0.2, yAxisID: 'y' },
                    { label: 'Kyslík (SpO2 %)', data: [], borderColor: '#79c0ff', backgroundColor: '#79c0ff', tension: 0.2, yAxisID: 'y1' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
                    y: { position: 'left', grid: { color: '#21262d' }, ticks: { color: '#ff7b72' }, min: 40, max: 160 },
                    y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#79c0ff' }, min: 80, max: 100 }
                },
                plugins: { legend: { labels: { color: '#e6edf3' } } }
            }
        });

        // Hlavní událost po kliknutí na tlačítko Start
        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (!('serial' in navigator)) {
                alert("Tvůj prohlížeč nepodporuje Web Serial API. Spusť to v Google Chrome.");
                return;
            }

            try {
                // Vyžádání portu (vyskočí okno)
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });

                // Změna stavu v UI
                document.getElementById('statusBox').innerText = "▶ Měření probíhá...";
                document.getElementById('statusBox').className = "status-text status-run";
                document.getElementById('connectBtn').disabled = true;

                // Nastavení čtení textu
                const textDecoder = new TextDecoderStream();
                const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
                reader = textDecoder.readable.getReader();

                // Smyčka pro neustálé chytání dat
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    if (value) {
                        inputBuffer += value;

                        // Máme celý řádek?
                        if (inputBuffer.includes("\n")) {
                            let radek = inputBuffer.trim();
                            inputBuffer = ""; // Smazat pro další kolo

                            if (radek.includes(",")) {
                                let casti = radek.split(",");
                                let tep = parseInt(casti[0].trim());
                                let kyslik = parseInt(casti[1].trim());

                                // Použití tvého přesného FILTRU z Pythonu
                                if (tep >= 40 && tep <= 200 && kyslik >= 90 && kyslik <= 100) {
                                    let nyni = new Date();
                                    let casText = nyni.toTimeString().split(' ')[0];

                                    // 1. Aktualizace karet na webu
                                    document.getElementById('tepVal').innerText = tep;
                                    document.getElementById('kyslikVal').innerText = tep + " %"; // Oprava překlepu z minula, dáváme tam správnou proměnnou a jednotku %
                                    document.getElementById('kyslikVal').innerText = kyslik + " %";
                                    document.getElementById('casVal').innerText = casText;

                                    // 2. Přidání dat do grafu
                                    vitalChart.data.labels.push(casText);
                                    vitalChart.data.datasets[0].data.push(tep);
                                    vitalChart.data.datasets[1].data.push(kyslik);

                                    // Aby graf nebyl nekonečně dlouhý, držíme posledních 20 měření
                                    if (vitalChart.data.labels.length > 20) {
                                        vitalChart.data.labels.shift();
                                        vitalChart.data.datasets[0].data.shift();
                                        vitalChart.data.datasets[1].data.shift();
                                    }

                                    // Překreslit graf na obrazovce
                                    vitalChart.update();
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                console.error(error);
                alert("Připojení selhalo nebo bylo zrušeno.");
                // Resetování tlačítek v případě chyby
                document.getElementById('statusBox').innerText = "⏹ Připraveno";
                document.getElementById('statusBox').className = "status-text status-ready";
                document.getElementById('connectBtn').disabled = false;
            }
        });
    </script>
</body>

</html>
