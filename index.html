<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <title>Monitor Vitálních Funkcí (Web Serial)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            color: #e6edf3;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .col-setup {
            flex: 2;
            background: #161b22;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #21262d;
        }

        .col-status {
            flex: 1;
            background: #161b22;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #21262d;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Karty s hodnotami */
        .cards-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .val {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: monospace;
        }

        .red {
            color: #ff7b72;
        }

        .blu {
            color: #79c0ff;
        }

        .grn {
            color: #56d364;
        }

        /* Tlačítka a design inputů */
        button {
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 5px;
        }

        .btn-start {
            background: #238636;
        }

        .btn-start:hover {
            background: #2ea043;
        }

        .btn-csv {
            background: #1f6feb;
            margin-top: 10px;
        }

        .btn-csv:hover {
            background: #388bfd;
        }

        button:disabled,
        select:disabled {
            background: #21262d !important;
            color: #8b949e !important;
            cursor: not-allowed;
            border-color: #30363d;
        }

        select {
            background: #0d1117;
            color: #e6edf3;
            border: 1px solid #30363d;
            padding: 10px;
            font-size: 1rem;
            border-radius: 6px;
            width: 100%;
            margin-bottom: 15px;
            outline: none;
        }

        .status-text {
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .status-ready {
            background: rgba(56, 139, 253, 0.15);
            color: #58a6ff;
            border: 1px solid rgba(56, 139, 253, 0.4);
        }

        .status-run {
            background: rgba(46, 160, 67, 0.15);
            color: #56d364;
            border: 1px solid rgba(46, 160, 67, 0.4);
        }

        /* Box pro graf */
        .chart-container {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 12px;
            padding: 20px;
            height: 350px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>◈ MONITOR VITÁLNÍCH FUNKCÍ (WEB SERIAL EXPERT)</h1>
    </div>

    <div class="row">
        <div class="col-setup">
            <label style="display:block; margin-bottom: 8px; color: #8b949e; font-weight: bold;">Vyberte
                pacienta:</label>
            <select id="patientSelect">
                <option value="Jana">Jana (Pacient 1)</option>
                <option value="Petr">Petr (Pacient 2)</option>
                <option value="Eliska">Eliška (Pacient 3)</option>
                <option value="Anonymni">Anonymní měření</option>
            </select>

            <label style="display:block; margin-bottom: 8px; color: #8b949e; font-weight: bold;">Měřicí
                přístroj:</label>
            <button id="connectBtn" class="btn-start">▶ START MĚŘENÍ (PŘIPOJIT BLUETOOTH)</button>
        </div>

        <div class="col-status">
            <div>
                <label style="display:block; margin-bottom: 8px; color: #8b949e; font-weight: bold;">Stav
                    systému</label>
                <div id="statusBox" class="status-text status-ready">⏹ Připraveno</div>
            </div>
            <button id="csvBtn" class="btn-csv" disabled>💾 ULOŽIT DATA DO CSV</button>
        </div>
    </div>

    <div class="cards-row">
        <div class="card">
            <div id="tepVal" class="val red">--</div>
            <div style="color: #8b949e; font-size: 0.9rem; margin-top: 5px;">TEP (BPM)</div>
        </div>
        <div class="card">
            <div id="kyslikVal" class="val blu">-- %</div>
            <div style="color: #8b949e; font-size: 0.9rem; margin-top: 5px;">KYSLÍK (SpO2)</div>
        </div>
        <div class="card">
            <div id="casVal" class="val grn">--:--:--</div>
            <div style="color: #8b949e; font-size: 0.9rem; margin-top: 5px;">ČAS ZÁZNAMU</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="vitalChart"></canvas>
    </div>

    <script>
        let port;
        let reader;
        let inputBuffer = "";

        // Pole pro ukládání historie měření pro CSV export
        let csvDataStore = [];

        // Inicializace Chart.js grafu v temném designu
            const ctx = document.getElementById('vitalChart').getContext('2d');
            const vitalChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        { label: 'Tep (BPM)', data: [], borderColor: '#ff7b72', backgroundColor: '#ff7b72', tension: 0.2, yAxisID: 'y' },
                        { label: 'Kyslík (SpO2 %)', data: [], borderColor: '#79c0ff', backgroundColor: '#79c0ff', tension: 0.2, yAxisID: 'y1' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } },
                        y: { position: 'left', grid: { color: '#21262d' }, ticks: { color: '#ff7b72' }, min: 40, max: 160 },
                        y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#79c0ff' }, min: 80, max: 100 }
                    }, // ◄ Tady se správně uzavírají "scales"
                    plugins: {
                        legend: { labels: { color: '#e6edf3' } }
                    } // ◄ Tady chyběla závorka, teď už je to v pořádku
                } // ◄ Uzavření celého bloku "options"
            });

        // Hlavní událost po kliknutí na tlačítko Start
        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (!('serial' in navigator)) {
                alert("Tvůj prohlížeč nepodporuje Web Serial API. Spusť to v Google Chrome.");
                return;
            }

            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });

                // Změna stavu v UI a uzamčení ovládání
                document.getElementById('statusBox').innerText = "▶ Měření probíhá...";
                document.getElementById('statusBox').className = "status-text status-run";
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('patientSelect').disabled = true;
                document.getElementById('csvBtn').disabled = false; // Aktivuje stažení CSV

                // Vyčištění staré historie před novým měřením
                csvDataStore = [];

                const textDecoder = new TextDecoderStream();
                const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
                reader = textDecoder.readable.getReader();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    if (value) {
                        inputBuffer += value;

                        if (inputBuffer.includes("\n")) {
                            let radek = inputBuffer.trim();
                            inputBuffer = "";

                            if (radek.includes(",")) {
                                let casti = radek.split(",");
                                let tep = parseInt(casti[0].trim());
                                let kyslik = parseInt(casti[1].trim());

                                // Filtrování chybových stavů
                                if (tep >= 40 && tep <= 200 && kyslik >= 90 && kyslik <= 100) {
                                    let nyni = new Date();
                                    let casText = nyni.toTimeString().split(' ')[0];
                                    let aktualniPacient = document.getElementById('patientSelect').value;

                                    // 1. Aktualizace karet na webu
                                    document.getElementById('tepVal').innerText = tep;
                                    document.getElementById('kyslikVal').innerText = kyslik + " %";
                                    document.getElementById('casVal').innerText = casText;

                                    // 2. Uložení vteřiny do lokální paměti pro CSV export
                                    csvDataStore.push({
                                        Pacient: aktualniPacient,
                                        Cas: casText,
                                        Tep: tep,
                                        Kyslik: kyslik
                                    });

                                    // 3. Přidání dat do grafu
                                    vitalChart.data.labels.push(casText);
                                    vitalChart.data.datasets[0].data.push(tep);
                                    vitalChart.data.datasets[1].data.push(kyslik);

                                    if (vitalChart.data.labels.length > 20) {
                                        vitalChart.data.labels.shift();
                                        vitalChart.data.datasets[0].data.shift();
                                        vitalChart.data.datasets[1].data.shift();
                                    }

                                    vitalChart.update();
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                console.error(error);
                alert("Připojení selhalo nebo bylo zrušeno.");
                document.getElementById('statusBox').innerText = "⏹ Připraveno";
                document.getElementById('statusBox').className = "status-text status-ready";
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('patientSelect').disabled = false;
            }
        });

        // Logika pro vygenerování a stažení CSV souboru
        document.getElementById('csvBtn').addEventListener('click', () => {
            if (csvDataStore.length === 0) {
                alert("Zatím nebyla nasbírána žádná data k exportu.");
                return;
            }

            // Hlavička CSV souboru
            let csvContent = "data:text/csv;charset=utf-8,Pacient,Cas Meredi,Tep (BPM),Kyslik (SpO2 %)\n";

            // Projití uložených záznamů a poskládání řádků
            csvDataStore.forEach(row => {
                csvContent += `${row.Pacient},${row.Cas},${row.Tep},${row.Kyslik}\n`;
            });

            // Vytvoření skrytého stahovacího odkazu v prohlížeči
            const encodedUri = encodeURI(csvContent);
            const downloadAnchor = document.createElement("a");

            // Nastavení názvu souboru podle vybraného pacienta a dnešního data
            let jmeno = document.getElementById('patientSelect').value;
            let dnes = new Date().toISOString().slice(0, 10);

            downloadAnchor.setAttribute("href", encodedUri);
            downloadAnchor.setAttribute("download", `mereni_${jmeno}_${dnes}.csv`);
            document.body.appendChild(downloadAnchor);

            // Simulace kliknutí pro spuštění stahování
            downloadAnchor.click();
            document.body.removeChild(downloadAnchor);
        });
    </script>
</body>

</html>
